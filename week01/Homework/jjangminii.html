<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>jjangmii 블로그</title>
    <link rel="stylesheet" href="style/index.css" />
  </head>
  <body>
    <!-- 헤더 영역 -->
    <header>
      <img
        src="https://avatars.githubusercontent.com/u/163228804?s=400&v=4"
        alt="jjangmii의 프로필 사진"
      />
      <div>
        <p class="header-title">jjangminii 블로그</p>
        <p class="header-description">정민이의 블로그입니다.</p>
      </div>
      <a href="https://github.com/jjangminii">
        <img
          src="https://cdn-icons-png.flaticon.com/512/25/25231.png"
          alt=" 깃허브 아이콘"
        />
      </a>
    </header>

    <!-- 메인 콘텐츠 영역 -->

    <main id="main-content">
      <!-- 네비바 영역 -->
      <nav>
        <ul>
          <li><a href="#">포토덤프</a></li>
          <li><a href="#">사진첩</a></li>
          <li><a href="#">좋아하는 것</a></li>
          <li><a href="#">To.웹왔니</a></li>
        </ul>
      </nav>
      <section>
        <!-- 포토덤프 영역 -->
        <div class="photo-grid">
          <div class="photo-item">
            <img src="./img/Photo01.jpeg" alt="photo" />
          </div>
          <div class="photo-item">
            <img src="./img/Photo02.jpeg" alt="photo" />
          </div>
          <div class="photo-item col-span-2">
            <img src="./img/Photo03.jpeg" alt="photo" />
          </div>
          <div class="photo-item col-span-3 row-span-2">
            <img src="./img/Photo04.jpeg" alt="photo" />
          </div>
          <div class="photo-item">
            <img src="./img/Photo05.jpeg" alt="photo" />
          </div>
          <div class="photo-item">
            <img src="./img/Photo06.jpeg" alt="photo" />
          </div>
        </div>
        <!-- 사진첩 영역 -->
        <div class="photo-album">
          <div class="album-track">
            <div class="album-item">
              <img src="./img/Photo01.jpeg" alt="사진1" />
            </div>
            <div class="album-item">
              <img src="./img/Photo02.jpeg" alt="사진2" />
            </div>
            <div class="album-item">
              <img src="./img/Photo03.jpeg" alt="사진3" />
            </div>
            <div class="album-item">
              <img src="./img/Photo04.jpeg" alt="사진4" />
            </div>
            <div class="album-item">
              <img src="./img/Photo05.jpeg" alt="사진5" />
            </div>
            <div class="album-item">
              <img src="./img/Photo06.jpeg" alt="사진6" />
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
