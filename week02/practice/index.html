<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DOM 실습</title>
  </head>
  <body>
    <button onClick="onClick()">리스트 추가하기</button>
    <ul id="ul"></ul>
  </body>

  <script>
    const onClick = () => {
      // 좋지않음 -> DOM 조작이 많아질수록 성능이 저하됨 3000개의 li 태그를 추가할 때마다 DOM이 3000번 업데이트됨

      //   // 1. ul 태그 찾기
      //   const ul = document.getElementById("ul");
      //   // 1 ~ 3000
      //   for (let i = 1; i <= 3000; i++) {
      //     const li = document.createElement("li");
      //     li.innerText = `${i}`;
      //     ul.appendChild(li);
      //   }

      // 개선된 방법 -> DOM 조작이 한 번만 일어나도록 함 3000개의 li 태그를 문자열로 만들어서 한 번에 DOM을 업데이트함
      const ul = document.getElementById("ul");
      let list = "";

      for (let i = 1; i <= 3000; i++) {
        list += `<li>${i}</li>`;
      }

      // 한 번만 갱신
      ul.innerHTML = list;
    };
  </script>
</html>
